# SPDX-License-Identifier: CC-BY-SA-4.0
#
# Harness Engineering Context for whisper-rs-nx
#
# Mechanical enforcement of project rules via hooks,
# progress files for session handoff, and quality gates.
#
# Concept: "Engineer the environment so the AI never repeats a mistake."

version: 1
name: harness-engineering
mirror:
  users: .users/context/harness.md
  users_ko: .users/context/ko/harness.md

overview:
  principle: "Text rules get forgotten; mechanical enforcement doesn't."
  pillars:
    - name: hooks
      description: "Claude Code hooks that intercept edits and commands in real-time"
    - name: progress_files
      description: "JSON session handoff files that survive context compaction and session boundaries"

  limitations: |
    Harness catches STYLE violations only (formatting, linting, file guards, naming).
    It CANNOT catch:
    - Design quality (wrong abstraction, poor generality)
    - Performance regressions
    - Semantic correctness (logic errors)
    - Scope creep (too many changes in one commit)
    Do NOT trust harness passage as proof of upstream quality.
    Phase 3 (critical review) exists specifically to catch what harness cannot.

hooks:
  location: .claude/hooks/
  registration: .claude/settings.json
  protocol:
    input: "stdin JSON — { tool_name, tool_input, cwd, session_id }"
    output: "stdout JSON — { reason, hookSpecificOutput: { hookEventName, additionalContext } }"
    blocking: "Set decision: 'block' in output to prevent tool execution (PreToolUse only)"

  trigger_timing_principle: |
    PreToolUse = runs BEFORE tool execution. Can block (decision: 'block').
    PostToolUse = runs AFTER tool execution. Advisory only — cannot undo.

    Design rule: If you need to ENFORCE a rule (prevent bad commits, block file edits),
    use PreToolUse. If you only need to REMIND (triple-mirror, checklist), use PostToolUse.
    A PostToolUse hook that tries to block is ineffective — the action already happened.

  authoring_rule: |
    When writing hooks, NEVER guess Claude Code API format.
    Read existing working hooks (e.g., naia-os/.claude/hooks/) first.
    Common bugs from guessing:
    - ESM import vs CJS require (depends on package.json presence)
    - stdin reading pattern (async for await, not readFileSync)
    - Output format (JSON with specific schema, not free text)
    - settings.json structure (nested under hooks.PreToolUse/PostToolUse)

  sync_entry_points:
    file: sync-entry-points.js
    trigger: "PostToolUse on Edit|Write"
    purpose: "Auto-sync CLAUDE.md ↔ AGENTS.md ↔ GEMINI.md"
    behavior:
      - "Detects when any entry point file is edited"
      - "Copies content to the other two (if they exist)"
      - "Only syncs to files that already exist"
    enforces: "Entry point files must always be identical"

  cascade_check:
    file: cascade-check.js
    trigger: "PostToolUse on Edit|Write"
    purpose: "Remind agent about triple-mirror updates"
    patterns:
      - ".agents/context/*.yaml → remind .users/context/ + .users/context/ko/"
      - ".users/context/*.md (not ko/) → remind .agents/ + .users/context/ko/"
      - ".users/context/ko/*.md → remind .agents/ + .users/context/"
    behavior: "Advisory (additionalContext), not blocking"

progress_files:
  location: .agents/progress/
  format: JSON
  gitignored: true
  purpose: "Session handoff — survives context compaction and session boundaries"
  schema:
    issue: "GitHub Issue reference (e.g., '#5')"
    title: "Short description of the work"
    project: "whisper-rs-nx"
    current_phase: "Current phase from development cycle"
    decisions:
      description: "Array of key decisions made during this work"
      fields: [decision, rationale, date]
    surprises:
      description: "Unexpected findings during investigation/build"
    blockers:
      description: "Current blockers preventing progress"
    updated_at: "ISO timestamp of last update"

directory_structure:
  committed:
    - .claude/settings.json
    - .claude/hooks/sync-entry-points.js
    - .claude/hooks/cascade-check.js
    - .agents/context/harness.yaml
    - .agents/progress/.gitkeep
  gitignored:
    - ".claude/* (except settings.json and hooks/)"
    - ".agents/progress/*.json"
